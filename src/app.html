<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="%sveltekit.assets%/logo.svg" />
		<meta name="theme-color" content="#0e0d0b" />
		<meta name="description" content="Studio Linse Hoogervorst is a practice for interior architecture, founded by Paul Linse in Amsterdam." />
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Studio Linse Hoogervorst" />
		<meta property="og:image" content="https://studiolinsehoogervorst.com/hero.jpg" />
		<script>
			// Dark is the default; apply it before first paint unless the visitor has
			// explicitly chosen light, so no wrong-theme flash. Mirrors theme.svelte.ts.
			try {
				if (localStorage.getItem('slh-theme') !== 'light')
					document.documentElement.setAttribute('data-theme', 'dark');
			} catch (e) {
				document.documentElement.setAttribute('data-theme', 'dark');
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
